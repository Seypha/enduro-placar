<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENDURO - RECORDES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    overflow-x: hidden;
  }

  .scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  .title {
    font-size: 18px;
    color: #ff4400;
    text-shadow: 0 0 10px #ff4400, 0 0 20px #ff4400;
    letter-spacing: 4px;
    margin-bottom: 6px;
    animation: flicker 3s infinite;
  }

  .subtitle {
    font-size: 10px;
    color: #ffaa00;
    letter-spacing: 6px;
    margin-bottom: 24px;
    text-shadow: 0 0 8px #ffaa00;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
    98% { opacity: 0.6; }
    99% { opacity: 1; }
  }

  .board {
    width: 100%;
    max-width: 700px;
    border: 2px solid #ff4400;
    box-shadow: 0 0 20px #ff440055, inset 0 0 20px #ff440011;
  }

  .board-header {
    display: grid;
    grid-template-columns: 50px 1fr 1fr;
    padding: 12px 16px;
    background: #ff4400;
    color: #000;
    font-size: 11px;
    letter-spacing: 2px;
  }

  .row {
    display: grid;
    grid-template-columns: 50px 1fr 1fr;
    padding: 14px 16px;
    font-size: 11px;
    border-bottom: 1px solid #ff440033;
    transition: background 0.2s;
    animation: slideIn 0.3s ease both;
  }

  .row:last-child { border-bottom: none; }

  .row:hover { background: #ff440011; }

  .row:nth-child(1) { color: #ffd700; text-shadow: 0 0 8px #ffd700; }
  .row:nth-child(2) { color: #c0c0c0; text-shadow: 0 0 6px #c0c0c0; }
  .row:nth-child(3) { color: #cd7f32; text-shadow: 0 0 6px #cd7f32; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .rank { color: #ff4400; }
  .row:nth-child(1) .rank,
  .row:nth-child(2) .rank,
  .row:nth-child(3) .rank { color: inherit; }

  .name { 
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding-right: 8px;
  }

  .score { text-align: right; }

  .loading {
    padding: 30px;
    text-align: center;
    font-size: 11px;
    color: #ff4400;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .error {
    padding: 20px;
    text-align: center;
    font-size: 11px;
    color: #ff0000;
  }

  .pixel-deco {
    font-size: 12px;
    color: #ff4400;
    margin: 4px 0;
    opacity: 0.6;
  }

  .updated {
    font-size: 9px;
    color: #444;
    margin-top: 12px;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="scanlines"></div>

<div class="pixel-deco">▓▒░ SeyphaVision ░▒▓</div>
<div class="title">ENDURO</div>
<div class="subtitle">RECORDES</div>

<div class="board">
  <div class="board-header">
    <span>#</span>
    <span>PILOTO</span>
    <span style="text-align:right">KILOMETROS</span>
  </div>
  <div id="leaderboard">
    <div class="loading">CARREGANDO...</div>
  </div>
</div>

<div class="updated" id="updated"></div>

<script>
const GAME_KEY = 'dev_12dfb6eb954b4b98bdfce06c87fbf321';
const LEADERBOARD_ID = '33856';

async function getGuestSession() {
  const res = await fetch('https://api.lootlocker.io/game/v2/session/guest', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ game_key: GAME_KEY, game_version: '1.0.0' })
  });
  const data = await res.json();
  return data.session_token;
}

async function getLeaderboard(token) {
  const res = await fetch(`https://api.lootlocker.io/game/leaderboards/${LEADERBOARD_ID}/list?count=10`, {
    headers: { 'x-session-token': token, 'Content-Type': 'application/json' }
  });
  return await res.json();
}

async function load() {
  const el = document.getElementById('leaderboard');
  try {
    const token = await getGuestSession();
    const data = await getLeaderboard(token);
    const items = data.items || [];

    if (!items.length) {
      el.innerHTML = '<div class="loading">SEM RECORDES AINDA</div>';
      return;
    }

    el.innerHTML = items.map((item, i) => `
      <div class="row" style="animation-delay:${i * 0.05}s">
        <span class="rank">${i + 1}</span>
        <span class="name">${(item.player?.name || 'ANONIMO').toUpperCase()}</span>
        <span class="score">${Number(item.score).toLocaleString('pt-BR')}km</span>
      </div>
    `).join('');

    const now = new Date();
    document.getElementById('updated').textContent =
      `ATUALIZADO: ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  } catch(e) {
    el.innerHTML = '<div class="error">ERRO AO CARREGAR</div>';
  }
}

load();
</script>
</body>
</html>
